<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Manfred Scheucher</title>
  <meta name="description" content="Manfred Scheucher" />
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="mystyle.css">
  <link rel="stylesheet" href="bg-anim.css">
</head>
<body>
  <a class="skip" href="#main">Zum Inhalt springen</a>
  <header>
    <nav class="nav" aria-label="Hauptnavigation">
      <div class="brand">
        <img src="files/ich1.jpg" alt="Picture of Manfred Scheucher" />
        <h1>Manfred Scheucher</h1>
      </div>
      <div class="right">
        <button class="theme" id="themeBtn" aria-label="Darstellung umschalten">Light</button>
      </div>
    </nav>
  </header>

  <main id="main" class="wrap layout">

    <!-- Left sidebar: tab navigation -->
    <nav class="tab-nav" aria-label="Sections">
      <button class="tab-btn active" data-tab="about">About</button>
      <button class="tab-btn" data-tab="software">Software</button>
      <button class="tab-btn" data-tab="academic-software">Academic Software</button>
      <button class="tab-btn" data-tab="preprints">Preprints</button>
      <button class="tab-btn" data-tab="publications">Publications</button>
      <button class="tab-btn" data-tab="theses">Theses</button>
      <button class="tab-btn" data-tab="talks">Talks</button>
    </nav>

    <!-- Right content area -->
    <div class="tab-content">

      <section id="about" class="tab-panel box shadow active" aria-labelledby="about-h">
        <div data-include="about.html">
          <p class="meta">Loading…</p>
        </div>
      </section>

      <section id="academic-software" class="tab-panel box shadow" aria-labelledby="academic-software-h">
        <h2 id="academic-software-h">Academic Software</h2>
        <div data-include="academic-software.html">
          <p class="meta">Loading…</p>
        </div>
      </section>

      <section id="software" class="tab-panel box shadow" aria-labelledby="software-h">
        <h2 id="software-h">Software</h2>
        <div data-include="software.html">
          <p class="meta">Loading…</p>
        </div>
      </section>

      <section id="preprints" class="tab-panel box shadow" aria-labelledby="preprints-h">
        <h2 id="preprints-h">Preprints</h2>
        <div data-include="preprints.html">
          <p class="meta">Loading…</p>
        </div>
      </section>

      <section id="publications" class="tab-panel box shadow" aria-labelledby="publications-h">
        <h2 id="publications-h">Publications</h2>
        <div data-include="publications.html">
          <p class="meta">Loading…</p>
        </div>
      </section>

      <section id="theses" class="tab-panel box shadow" aria-labelledby="theses-h">
        <h2 id="theses-h">Theses</h2>
        <div data-include="theses.html">
          <p class="meta">Loading…</p>
        </div>
      </section>

      <section id="talks" class="tab-panel box shadow" aria-labelledby="talks-h">
        <h2 id="talks-h">Talks</h2>
        <div data-include="talks.html">
          <p class="meta">Loading…</p>
        </div>
      </section>

    </div>
  </main>

  <script>
    // obfuscate E-Mail
    function setEmailLink(){
      var u = "manfred.scheucher"; var d = "proton.me"; var e = u + "@" + d;
      var a = document.getElementById('emailLink');
      if(a){ a.href = 'mailto:' + e; a.textContent = "Email"; }
    }
    setEmailLink();

    // Theme-Toggle (Light ↔ Dark)
    (function(){
      var KEY = 'theme-pref';
      var btn = document.getElementById('themeBtn');
      function apply(mode){
        var m = (mode === 'dark') ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', m);
        if(btn){
          btn.textContent = (m === 'dark') ? 'Dark' : 'Light';
          btn.setAttribute('aria-pressed', (m === 'dark'));
          btn.title = 'Darstellung: ' + btn.textContent + ' – klicken zum Umschalten';
        }
      }
      var pref = localStorage.getItem(KEY);
      if(pref !== 'dark' && pref !== 'light'){ pref = 'light'; }
      apply(pref);
      if(btn){
        btn.addEventListener('click', function(){
          pref = (pref === 'light') ? 'dark' : 'light';
          localStorage.setItem(KEY, pref);
          apply(pref);
        });
      }
    })();

    // Tab switching
    (function(){
      var btns = document.querySelectorAll('.tab-btn');
      var panels = document.querySelectorAll('.tab-panel');

      function activate(id){
        btns.forEach(function(b){ b.classList.toggle('active', b.dataset.tab === id); });
        panels.forEach(function(p){ p.classList.toggle('active', p.id === id); });
        history.replaceState(null, '', '#' + id);
      }

      btns.forEach(function(btn){
        btn.addEventListener('click', function(){ activate(btn.dataset.tab); });
      });

      // Restore from hash
      var hash = window.location.hash.replace('#','');
      var valid = ['about','academic-software','software','preprints','publications','theses','talks'];
      if(valid.indexOf(hash) !== -1){ activate(hash); }
    })();

    // Client-side includes
    (function(){
      var nodes = document.querySelectorAll('[data-include]');
      nodes.forEach(function(el){
        var url = el.getAttribute('data-include');
        if(!url) return;
        fetch(url, {cache: 'no-cache'})
          .then(function(res){
            if(!res.ok) throw new Error(res.status);
            return res.text();
          })
          .then(function(html){
            el.innerHTML = html;
            try { setEmailLink(); } catch(_) {}
          })
          .catch(function(err){
            el.innerHTML = '<p class="meta">Could not load <code>'+url+'</code> ('+err.message+').</p>';
          });
      });
    })();
  </script>
</body>
</html>
